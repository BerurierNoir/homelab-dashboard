name: homelab_dashboard
description: HomeLab Dashboard — manage your self-hosted services
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  webview_flutter: ^4.4.2
  http: ^1.2.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  flutter_staggered_animations: ^1.1.1
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  url_launcher: ^6.2.5
  local_auth: ^2.3.0
  image_picker: ^1.1.2
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  encrypt: ^5.0.3
  crypto: ^3.0.3
  file_picker: ^8.1.2
  share_plus: ^10.0.3
  web_socket_channel: ^3.0.1
  permission_handler: ^11.3.1
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
